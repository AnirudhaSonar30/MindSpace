<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>MindSpace — a quiet sky for a loud mind</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Instrument+Serif:ital@0;1&family=DM+Sans:wght@300;400;500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

  <!-- Critical loader styles — inlined so the loader is fully rendered on first paint,
       before any external CSS file has a chance to arrive. -->
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; background: #06061a; }

    .premium-loader {
      position: fixed;
      inset: 0;
      z-index: 9999;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 44px;
      opacity: 1;
      pointer-events: auto;
      overflow: hidden;
      background:
        radial-gradient(ellipse 80% 55% at 50% 62%, #100d2e 0%, #06061a 52%, #030310 100%);
      transition: opacity 1000ms cubic-bezier(0.16,1,0.3,1),
                  visibility 0s linear 1000ms;
    }
    /* Soft nebula halos — depth before the sky loads */
    .premium-loader::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 55% 38% at 38% 58%, rgba(90,55,160,0.18) 0%, transparent 70%),
        radial-gradient(ellipse 45% 32% at 68% 44%, rgba(35,65,180,0.13) 0%, transparent 65%),
        radial-gradient(ellipse 30% 20% at 50% 78%, rgba(160,80,90,0.08) 0%, transparent 60%);
      pointer-events: none;
    }
    .premium-loader.done {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    /* Brand */
    .premium-loader-mark {
      display: inline-flex;
      align-items: center;
      gap: 16px;
      font-family: 'Cormorant Garamond', 'Instrument Serif', Georgia, serif;
      font-style: italic;
      font-weight: 300;
      font-size: 52px;
      color: rgba(243,239,230,0.92);
      letter-spacing: 0.02em;
      position: relative;
    }
    .premium-loader-mark .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: rgba(243,239,230,0.92);
      box-shadow: 0 0 20px rgba(243,239,230,0.7), 0 0 40px rgba(180,200,255,0.3);
      flex-shrink: 0;
      animation: loaderDotPulse 2s ease-in-out infinite;
    }
    @keyframes loaderDotPulse {
      0%,100% { opacity: 0.45; transform: scale(0.75); box-shadow: 0 0 12px rgba(243,239,230,0.4); }
      50%     { opacity: 1;    transform: scale(1.25); box-shadow: 0 0 24px rgba(243,239,230,0.8), 0 0 48px rgba(180,200,255,0.4); }
    }

    /* Tagline */
    .premium-loader-sub {
      font-family: 'JetBrains Mono', 'Courier New', monospace;
      font-size: 10px;
      letter-spacing: 0.32em;
      text-transform: uppercase;
      color: rgba(243,239,230,0.32);
      text-align: center;
      margin-top: -28px; /* pull up toward brand name */
    }

    /* Progress */
    .premium-loader-track {
      position: relative;
      width: 260px;
      height: 1px;
      background: rgba(243,239,230,0.07);
      overflow: visible;
    }
    .premium-loader-bar {
      position: absolute;
      top: 0; left: 0; bottom: 0;
      right: auto;
      width: 100%;
      background: linear-gradient(90deg,
        rgba(243,239,230,0.40) 0%,
        rgba(243,239,230,0.95) 85%,
        rgba(220,230,255,1)   100%);
      box-shadow: 0 0 14px rgba(243,239,230,0.55), 0 0 32px rgba(180,210,255,0.25);
      transform-origin: 0 0;
      transform: scaleX(0);
      transition: transform 80ms linear;
    }
    /* Glowing head dot that rides the bar */
    .premium-loader-bar::after {
      content: '';
      position: absolute;
      right: -1px;
      top: 50%;
      transform: translateY(-50%);
      width: 3px;
      height: 3px;
      border-radius: 50%;
      background: rgba(220,230,255,1);
      box-shadow: 0 0 8px rgba(220,230,255,1), 0 0 18px rgba(180,210,255,0.7);
    }

    /* Counter row */
    .premium-loader-meta {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      width: 260px;
      font-family: 'JetBrains Mono', 'Courier New', monospace;
      font-size: 9.5px;
      letter-spacing: 0.26em;
      text-transform: uppercase;
      color: rgba(243,239,230,0.22);
    }
    .premium-loader-count {
      color: rgba(243,239,230,0.65);
      letter-spacing: 0.14em;
      font-size: 11px;
    }
  </style>

  <!-- Core dependencies — must load before any app script -->

  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js"></script>
